spring:
  application:
    name: MemoryMe

  config:
    import:
      - optional:file:./memme.yaml
      - optional:file:.env

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  main:
    web-application-type: servlet

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true

  mvc:
    problemdetails:
      enabled: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    protocol: smtp
    tls: true
    properties:
      mail:
        smtp:
          auth: true
          timeout: 5000
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    deep-linking: true
    display-request-duration: true
    filter: true
    try-it-out-enabled: true
    persist-authorization: true

  api-docs:
    path: /v1/api-docs

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:12}
    max-tokens: ${OPENAI_MAX_TOKENS:500}

search:
  enabled: ${SEARCH_ENABLED:false}
  index-name: ${SEARCH_INDEX_NAME:memme_search}
  initialize-index: ${SEARCH_INITIALIZE_INDEX:true}

cloud:
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION}
      base-prefix: ${AWS_S3_BASE}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}

management:
  health:
    elasticsearch:
      enabled: ${SEARCH_ENABLED:false}
    mail:
      enabled: false

